version: "3.9"

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hiresense
      POSTGRES_USER: hiresense
      POSTGRES_PASSWORD: hiresense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresense -d hiresense"]
      interval: 10s
      timeout: 5s
      retries: 5

  app_5010:
    build: .
    restart: unless-stopped
    environment:
      PORT: 5010
      DATABASE_URL: postgresql://hiresense:hiresense@db:5432/hiresense
      SECRET_KEY: ${SECRET_KEY:-change-me}
      FLASK_APP: run.py
    ports:
      - "5010:5010"
    depends_on:
      db:
        condition: service_healthy

  app_5011:
    build: .
    restart: unless-stopped
    environment:
      PORT: 5011
      DATABASE_URL: postgresql://hiresense:hiresense@db:5432/hiresense
      SECRET_KEY: ${SECRET_KEY:-change-me}
      FLASK_APP: run.py
    ports:
      - "5011:5011"
    depends_on:
      db:
        condition: service_healthy

  app_5012:
    build: .
    restart: unless-stopped
    environment:
      PORT: 5012
      DATABASE_URL: postgresql://hiresense:hiresense@db:5432/hiresense
      SECRET_KEY: ${SECRET_KEY:-change-me}
      FLASK_APP: run.py
    ports:
      - "5012:5012"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
