{% extends "auth/auth_base.html" %}

{% block title %} – Register{% endblock %}

{% block head_extra %}
<style>
    @keyframes pw-icon-pop {
        0% {
            transform: scale(0.4) rotate(-25deg);
            opacity: 0;
        }

        60% {
            transform: scale(1.25) rotate(6deg);
            opacity: 1;
        }

        100% {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }
    }

    .pw-icon-pop {
        animation: pw-icon-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
</style>
{% endblock %}

{% block auth_content %}
<h1 class="text-4xl text-text-main font-bold tracking-tighter mb-8 text-left">Register</h1>

<form method="POST" class="w-full max-w-md">
    <div class="mb-6">
        <label class="text-xl font-bold block mb-2">Username</label>
        <input name="username" type="text" placeholder="Username" required
            class="text-xl w-full px-4 py-3 rounded-md border border-border-main focus:border-primary-800 outline-none transition-colors">
    </div>

    <div class="mb-4">
        <label class="text-xl font-bold block mb-2">Email Address</label>
        <input name="email" type="email" placeholder="name@company.com" required
            class="text-xl w-full px-4 py-3 rounded-md border border-border-main focus:border-primary-800 outline-none transition-colors">
    </div>

    <div class="mb-6">
        <label class="text-xl font-bold block mb-2">Password</label>
        <div class="relative">
            <input id="reg-pw" name="password" type="password" placeholder="Password" required
                class="text-xl w-full px-4 py-3 pr-14 rounded-md border border-border-main focus:border-primary-800 outline-none transition-colors">
            <button type="button" onclick="togglePw('reg-pw', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-md text-text-light hover:text-primary-800 hover:bg-primary-50 transition-colors duration-150 focus:outline-none"
                aria-label="Toggle password visibility">
                <!-- Eye (password hidden) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                <!-- Eye-slash (password visible) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
            </button>
        </div>
    </div>

    <div class="mb-8">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold">Role</span>
            <div class="flex gap-2">
                <input type="radio" name="role" id="role_manager" value="manager" class="sr-only peer/manager" checked>
                <label for="role_manager"
                    class="px-5 py-2 rounded-full border-2 border-primary-950 text-primary-950 font-semibold cursor-pointer select-none transition-all duration-200 peer-checked/manager:bg-primary-950 peer-checked/manager:text-text-inverse hover:bg-primary-100 peer-checked/manager:hover:bg-primary-900">
                    Manager
                </label>
                <input type="radio" name="role" id="role_employee" value="employee" class="sr-only peer/employee">
                <label for="role_employee"
                    class="px-5 py-2 rounded-full border-2 border-primary-950 text-primary-950 font-semibold cursor-pointer select-none transition-all duration-200 peer-checked/employee:bg-primary-950 peer-checked/employee:text-text-inverse hover:bg-primary-100 peer-checked/employee:hover:bg-primary-900">
                    Employee
                </label>
            </div>
        </div>
    </div>

    <button type="submit"
        class="text-xl w-full py-3 mb-6 rounded-md bg-primary-950 text-text-inverse font-bold hover:bg-primary-700 transition-colors shadow-sm">
        Register
    </button>

    <p class="text-center">
        <span class="text-sm text-text-muted">Already have an account? </span>
        <a href="{{ url_for('auth.login') }}" class="text-sm text-primary-800 font-semibold hover:underline">Log In</a>
    </p>
</form>

<script>
    function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.querySelectorAll('svg').forEach(s => s.classList.toggle('hidden'));
        const visible = btn.querySelector('svg:not(.hidden)');
        visible.classList.remove('pw-icon-pop');
        void visible.offsetWidth;
        visible.classList.add('pw-icon-pop');
        visible.addEventListener('animationend', () => visible.classList.remove('pw-icon-pop'), { once: true });
    }
</script>
{% endblock %}
