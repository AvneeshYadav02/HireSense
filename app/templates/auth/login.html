{% extends "base.html" %}
{% block title %} – Login{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="POST">
  <p><label>Username<br><input type="text" name="username" required autofocus></label></p>
  <p><label>Password<br><input type="password" name="password" required></label></p>
  <p><label><input type="checkbox" name="remember"> Remember me</label></p>
  <p><button type="submit">Login</button></p>
</form>
<p><a href="{{ url_for('auth.register') }}">Register as Manager or Employee</a></p>
{% endblock %}
