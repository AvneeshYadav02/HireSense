{% extends "admin/admin_base.html" %}
{% block title %} – Edit User{% endblock %}

{% block admin_content %}<div class="px-6 pb-6">
<h1>Edit User: {{ user.username }}</h1>

<form method="POST">
    <div>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ user.username }}" required>
    </div>
    <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required>
    </div>
    <div>
        <label for="role">Role</label>
        <select id="role" name="role">
            <option value="employee" {{ "selected" if user.role=="employee" }}>Employee</option>
            <option value="manager" {{ "selected" if user.role=="manager" }}>Manager</option>
            <option value="admin" {{ "selected" if user.role=="admin" }}>Admin</option>
        </select>
    </div>
    <div>
        <label for="is_active">
            <input type="checkbox" id="is_active" name="is_active" {{ "checked" if user.is_active }}>
            Active
        </label>
    </div>
    <div>
        <label for="is_approved">
            <input type="checkbox" id="is_approved" name="is_approved" {{ "checked" if user.is_approved }}>
            Approved
        </label>
    </div>
    <div>
        <button type="submit">Save Changes</button>
        <a href="{{ url_for('admin.manage_users') }}">Cancel</a>
    </div>
</form>
</div>{% endblock %}
